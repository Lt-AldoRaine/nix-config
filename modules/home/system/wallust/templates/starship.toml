# Generated by wallust. Do not edit by hand.
add_newline = true
format = "$directory$git_branch$git_state$git_status$character"

[directory]
style = "{{color4}}"

[character]
success_symbol = "[❯]({{color4}})"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](cyan)"

[git_branch]
symbol = "[]({{color8}}) "
style = "fg:{{color4}} bg:{{color8}}"
format = "on [$symbol$branch]($style)[]({{color8}}) "

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218)($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = ""
renamed = ""
deleted = ""
stashed = "≡"

[git_state]
format = "([$state( $progress_current/$progress_total)]($style)) "
style = "bright-black"
